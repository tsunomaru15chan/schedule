<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>惣一郎の冒険 - 週間学習管理クエストシート</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --bg-dark: #0d1117;
      --bg-card: #161b22;
      --text-main: #c9d1d9;
      --amber: #f59e0b;
      --emerald: #10b981;
      --blue: #3b82f6;
      --indigo: #6366f1;
      --rose: #f43f5e;
      --border-color: #30363d;
    }
    body { background-color: var(--bg-dark); color: var(--text-main); font-family: sans-serif; }
    .quest-card { background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-dark) 100%); border: 4px solid var(--amber); border-radius: 12px; padding: 20px; margin-bottom: 24px; }
    .quest-checkbox { appearance: none; height: 1.4rem; width: 1.4rem; border: 2px solid var(--amber); border-radius: 4px; background-color: var(--bg-dark); cursor: pointer; }
    .quest-checkbox:checked { background-color: var(--emerald); border-color: var(--emerald); }
    .quest-checkbox:checked::after { content: '✓'; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    .hidden { display: none !important; }
    .block { display: block !important; }
    @media print { .no-print { display: none !important; } body { background: #fff; color: #000; } }
  </style>
</head>
<body class="p-4 md:p-12">
  <div class="container max-w-4xl mx-auto">
    <!-- Header -->
    <header class="quest-card text-center">
      <h1 class="text-3xl font-black text-amber-500 mb-2">⚔️ 惣一郎の受験攻略クエストシート</h1>
      <p class="text-emerald-400 font-bold">目指せ、最強の受験マスター！</p>
    </header>

    <!-- Simple Nav -->
    <div class="flex flex-wrap gap-2 justify-center mb-6 no-print">
      <button onclick="showTab('day1')" class="px-4 py-2 bg-slate-800 rounded text-sm font-bold border border-amber-500">月曜</button>
      <button onclick="showTab('day2')" class="px-4 py-2 bg-slate-800 rounded text-sm font-bold border border-amber-500">火曜</button>
      <button onclick="window.print()" class="px-4 py-2 bg-emerald-600 text-white rounded text-sm font-bold">🖨️ 印刷</button>
    </div>

    <!-- Content -->
    <div id="day1" class="day-page block">
      <div class="quest-card">
        <h2 class="text-xl text-amber-500 mb-4 font-bold">⚔️ 月曜クエスト</h2>
        <label class="flex items-center gap-3 cursor-pointer mb-3">
          <input type="checkbox" class="quest-checkbox" onchange="saveData()">
          <span>[算数] 計算 (10分)</span>
        </label>
      </div>
    </div>
    <div id="day2" class="day-page hidden">
      <div class="quest-card">
        <h2 class="text-xl text-amber-500 mb-4 font-bold">⚔️ 火曜クエスト</h2>
        <label class="flex items-center gap-3 cursor-pointer mb-3">
          <input type="checkbox" class="quest-checkbox" onchange="saveData()">
          <span>[国語] 漢字 (10分)</span>
        </label>
      </div>
    </div>
  </div>

  <script>
    function showTab(id) {
      document.querySelectorAll('.day-page').forEach(p => p.classList.add('hidden'));
      document.getElementById(id).classList.remove('hidden');
    }
    function saveData() {
      const states = Array.from(document.querySelectorAll('.quest-checkbox')).map(c => c.checked);
      localStorage.setItem('quest_data', JSON.stringify(states));
    }
    window.onload = () => {
      const saved = localStorage.getItem('quest_data');
      if (saved) {
        const states = JSON.parse(saved);
        document.querySelectorAll('.quest-checkbox').forEach((c, i) => c.checked = states[i]);
      }
    };
  </script>
</body>
</html>
